<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Espetinho Junco</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card-wrap">
            <div class="login-card">
                <div class="login-logo">
                    <img src="{{ url_for('static', filename='junco_espetinho.png') }}" alt="Espetinho Junco" style="width:100px;height:auto;margin-bottom:0.75rem">
                    <h1>Espetinho Junco</h1>
                    <p>Sistema de Gestão</p>
                    <p class="login-subtitle">Faça login para acessar o sistema</p>
                </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                <div class="form-group">
                    <label for="nome">
                        <i class="fas fa-user"></i>
                        Usuário
                    </label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu usuário" required autofocus>
                </div>
                <div class="form-group">
                    <label for="senha">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i>
                    Entrar
                </button>
            </form>
        </div>
        </div>
        <div class="login-brand">
            <span class="brand-omega">Ω</span>
            <span class="brand-name">OmegaDev's Solutions</span>
        </div>
    </div>
</body>
</html>
